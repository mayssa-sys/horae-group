<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="50%" stop-color="#00b8a0"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#009e88"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00b89c"/>
      <stop offset="100%" stop-color="#008873"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- HG Mark -->
  <g transform="translate(2, 5)">
    <!-- H letter -->
    <!-- Left vertical -->
    <rect x="0" y="0" width="8" height="52" rx="2" fill="url(#grad2)"/>
    <!-- Right vertical -->
    <rect x="22" y="0" width="8" height="52" rx="2" fill="url(#grad2)"/>
    <!-- Crossbar -->
    <rect x="8" y="22" width="14" height="8" rx="1" fill="url(#grad3)"/>

    <!-- G letter with person silhouette -->
    <!-- Top arc of G -->
    <path d="M42 8 C42 3, 46 0, 52 0 L62 0 C66 0, 68 2, 68 5 L68 8 L60 8 L60 6 C60 5, 59 4, 57 4 L52 4 C48 4, 46 6, 46 8 L46 8" fill="url(#grad2)"/>
    <!-- Left vertical of G -->
    <rect x="42" y="8" width="4" height="36" rx="1" fill="url(#grad2)"/>
    <!-- Bottom of G -->
    <path d="M42 44 L42 48 C42 51, 45 52, 48 52 L62 52 C66 52, 68 50, 68 47 L68 28 L58 28 L58 44 C58 46, 57 48, 54 48 L48 48 C47 48, 46 47, 46 44" fill="url(#grad3)"/>
    <!-- G crossbar -->
    <rect x="58" y="24" width="10" height="4" rx="1" fill="url(#grad2)"/>
    
    <!-- Person silhouette inside G (head as dot at top right of G) -->
    <circle cx="63" cy="8" r="4" fill="url(#grad2)" opacity="0.7"/>
  </g>

  <!-- Text: HORAE -->
  <text x="82" y="34" font-family="'Space Grotesk', 'Inter', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2.5">HORAE</text>

  <!-- Text: GROUP -->
  <text x="82" y="54" font-family="'Space Grotesk', 'Inter', Arial, sans-serif" font-size="13" font-weight="500" fill="url(#textGrad)" letter-spacing="6">GROUP</text>
</svg>
