<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentSub" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- HG Mark: Two human figures forming H and G -->
  <g transform="translate(4, 3)">
    <!-- Figure 1 (H - standing person, left) -->
    <!-- Head -->
    <circle cx="16" cy="8" r="5.5" fill="url(#accent)"/>
    <!-- Body - standing tall (forms left of H) -->
    <path d="M16 14 L16 42" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Left arm reaching right (forms crossbar of H) -->
    <path d="M16 24 L36 24" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M16 42 L8 56" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <path d="M16 42 L24 56" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

    <!-- Figure 2 (G - bowing person, right) -->
    <!-- Head -->
    <circle cx="36" cy="8" r="5.5" fill="url(#accent)"/>
    <!-- Body - slight bow (forms right of H and curve of G) -->
    <path d="M36 14 L36 30" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Bowing torso curves into G shape -->
    <path d="M36 30 Q36 48, 22 50" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- G crossbar (arm reaching inward) -->
    <path d="M36 38 L28 38" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Standing leg -->
    <path d="M36 30 L44 50" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

    <!-- Connection dot between figures (human connection) -->
    <circle cx="26" cy="24" r="2" fill="url(#accent)" opacity="0.5"/>
  </g>

  <!-- Text: HORAE -->
  <text x="62" y="34" font-family="'Space Grotesk', 'Inter', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2.5">HORAE</text>

  <!-- Text: GROUP -->
  <text x="62" y="54" font-family="'Space Grotesk', 'Inter', Arial, sans-serif" font-size="13" font-weight="500" fill="url(#accentSub)" letter-spacing="6">GROUP</text>
</svg>
