<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70">
  <defs>
    <linearGradient id="tealDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a9d8f"/>
      <stop offset="100%" stop-color="#1f8578"/>
    </linearGradient>
    <linearGradient id="tealLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#3bbfb5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2a9d8f" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- HG Mark faithful to original -->
  <g transform="translate(0, 3)">
    <!-- H letter -->
    <!-- Left vertical bar (dark teal) -->
    <rect x="0" y="0" width="10" height="56" fill="#2a9d8f"/>
    <!-- Right vertical bar (dark teal) -->
    <rect x="24" y="0" width="10" height="56" fill="#2a9d8f"/>
    <!-- Crossbar (light teal) -->
    <rect x="10" y="22" width="14" height="12" fill="#4ecdc4"/>

    <!-- G letter with bowing person arch -->
    <!-- Left vertical of G (dark teal) -->
    <rect x="40" y="0" width="10" height="56" fill="#2a9d8f"/>
    <!-- Top arch (dark teal) - the person bowing -->
    <path d="M50 0 L64 0 C72 0, 76 6, 76 14 L76 24 L66 24 L66 14 C66 10, 64 8, 60 8 L56 8 L56 0 Z" fill="#2a9d8f"/>
    <!-- Inner arch cutout shape (creates the bowing person silhouette) -->
    <path d="M56 8 L56 24 L66 24 L66 14 C66 10, 64 8, 60 8 Z" fill="#0d1b2a"/>
    <!-- Bottom right of G (light teal) -->
    <rect x="66" y="24" width="10" height="32" fill="#4ecdc4"/>
    <!-- Bottom bar of G (light teal) -->
    <rect x="40" y="44" width="26" height="12" fill="#4ecdc4"/>
    <!-- G crossbar / middle shelf (light teal) -->
    <rect x="56" y="24" width="10" height="10" fill="#4ecdc4"/>
  </g>

  <!-- Text: HORAE -->
  <text x="90" y="35" font-family="'Space Grotesk', 'Inter', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2.5">HORAE</text>

  <!-- Text: GROUP -->
  <text x="90" y="54" font-family="'Space Grotesk', 'Inter', Arial, sans-serif" font-size="13" font-weight="500" fill="url(#textGrad)" letter-spacing="6">GROUP</text>
</svg>
